name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=core --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Run integration test
      run: |
        python -c "from core.data_fetcher import DataFetcher; print('✅ DataFetcher导入成功')"
        python -c "from core.analyzer import ScoreEngine; print('✅ ScoreEngine导入成功')"
        python -c "from core.reporter import Reporter; print('✅ Reporter导入成功')"
        python -c "from memory.memory_manager import MemoryManager; print('✅ MemoryManager导入成功')"

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install linting tools
      run: |
        pip install black flake8 mypy

    - name: Check code formatting with black
      run: |
        black --check core/ memory/ tests/

    - name: Lint with flake8
      run: |
        flake8 core/ memory/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 core/ memory/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      run: |
        mypy core/ memory/ tests/ --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Verify package structure
      run: |
        echo "📦 验证项目结构..."
        find . -name "*.py" -type f | wc -l | xargs echo "Python文件数量:"
        python main.py --help | head -10
        echo "✅ 项目结构验证通过"
